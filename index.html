            --white: #ffffff;

            --gradient: linear-gradient(135deg, var(--secondary), #7000ff);
        }

        html { scroll-behavior: smooth; font-size: 16px; }

        body {

            background-attachment: fixed;

        /* --- NOVO MENU SUPERIOR --- */
        .navbar {

            z-index: 1000;

        }

            padding: 0 20px;
        }

        .nav-logo {
            font-weight: bold;
            font-size: 1.3rem;
            text-decoration: none;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-links {
            display: flex;
            gap: 25px;
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text);
            font-size: 0.9rem;
            font-weight: 500;
            transition: 0.3s;
        }

        .nav-links a:hover {
            color: var(--primary);
        }

        @media (max-width: 768px) {
            .nav-links { display: none; } /* Oculto em mobile para simplicidade, ou pode ser expandido */
        }

        }

            position: absolute;
